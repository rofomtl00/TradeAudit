<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:320px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e0e0e0}
.header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a1a1a}
.header h1{font-size:15px;color:#fff;font-weight:600}.header h1 span{color:#ef4444}
.header .meta{font-size:11px;color:#555}
.main{padding:14px 16px}

.exchange{font-size:13px;color:#999;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-on{background:#22c55e}
.dot-off{background:#555}

.stats{display:flex;gap:12px;margin-bottom:14px}
.stat{text-align:center;flex:1}
.stat .num{font-size:18px;font-weight:700;color:#fff}
.stat .num.ok{color:#22c55e}
.stat .lbl{font-size:10px;color:#555;margin-top:1px}

.actions{display:flex;gap:6px;margin-bottom:12px}
.btn{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;text-align:center;transition:background .15s}
.btn-cap{background:#1a1a2e;color:#a78bfa}
.btn-cap:hover{background:#2e1a5f}
.btn-sub{background:#111;color:#888;border:1px solid #222}
.btn-sub:hover{background:#1a1a1a}
.btn:disabled{opacity:0.3;cursor:default}

.entries{max-height:140px;overflow-y:auto}
.entry{font-size:11px;color:#666;padding:4px 0;display:flex;justify-content:space-between}
.entry .time{color:#444;font-family:monospace}
.entry .info{color:#888}
.empty{font-size:12px;color:#444;text-align:center;padding:16px 0}

.footer{padding:10px 16px;border-top:1px solid #1a1a1a;text-align:center}
.footer a{color:#444;font-size:10px;text-decoration:none}
.footer a:hover{color:#888}
</style>
</head>
<body>

<div class="header">
  <h1>Trade<span>Audit</span></h1>
  <span class="meta" id="chainLabel">—</span>
</div>

<div class="main">
  <div class="exchange">
    <div class="dot dot-off" id="dot"></div>
    <span id="exchangeName">Detecting...</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="num" id="events">0</div><div class="lbl">Events</div></div>
    <div class="stat"><div class="num" id="digests">0</div><div class="lbl">Digests</div></div>
  </div>

  <div class="actions">
    <button class="btn btn-cap" id="captureBtn">Capture</button>
    <button class="btn btn-sub" id="verifyBtn">Verify</button>
    <button class="btn btn-sub" id="digestBtn">Digest</button>
    <button class="btn btn-sub" id="exportBtn">Export</button>
  </div>

  <div class="entries" id="entries">
    <div class="empty">No events yet</div>
  </div>
</div>

<div class="footer">
  <a href="https://rofomtl00.github.io/TradeAudit/" target="_blank">tradeaudit</a>
</div>

<script src="popup.js"></script>
</body>
</html>
